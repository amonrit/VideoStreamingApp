name: AI PR Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # 2. Debug PR Info
      # =========================
      - name: Debug PR Context
        run: |
          echo "=== PR INFO ==="
          echo "Base: ${{ github.event.pull_request.base.ref }}"
          echo "Head: ${{ github.event.pull_request.head.ref }}"
          echo "Repo: ${{ github.repository }}"

      # =========================
      # 3. Get diff (FIXED)
      # =========================
      - name: Get Diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}

          echo "=== GENERATING DIFF ==="
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > diff.txt

          echo "=== DIFF SIZE ==="
          wc -c diff.txt

          echo "=== DIFF PREVIEW ==="
          head -c 2000 diff.txt

      # =========================
      # 4. Validate diff
      # =========================
      - name: Validate Diff
        id: check
        run: |
          SIZE=$(wc -c < diff.txt)

          if [ "$SIZE" -eq 0 ]; then
            echo "❌ DIFF IS EMPTY"
            echo "comment=❌ No changes detected in this PR." >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "ok=true" >> $GITHUB_OUTPUT

      # =========================
      # 5. Call OpenAI
      # =========================
      - name: AI Review
        if: steps.check.outputs.ok == 'true'
        id: ai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "🤖 Calling OpenAI..."

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
          -H "Authorization: Bearer $OPENAI_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{
            "model": "gpt-4o-mini",
            "messages": [
              {
                "role": "system",
                "content": "You are a senior iOS engineer reviewing SwiftUI + AVPlayer streaming code. Focus on bugs, memory leaks, performance, and architecture."
              },
              {
                "role": "user",
                "content": "'"$(cat diff.txt | head -c 12000)"'"
              }
            ]
          }')

          # =========================
          # RAW DEBUG OUTPUT (IMPORTANT)
          # =========================
          echo "=============================="
          echo "=== RAW RESPONSE START ==="
          echo "$RESPONSE" | jq .
          echo "=== RAW RESPONSE END ==="
          echo "=============================="

          echo "$RESPONSE" > response.json

          # =========================
          # ERROR HANDLING
          # =========================
          ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          echo "=== EXTRACTED VALUES ==="
          echo "ERROR: $ERROR"
          echo "CONTENT LENGTH: ${#CONTENT}"

          if [ ! -z "$ERROR" ]; then
            echo "❌ OPENAI ERROR DETECTED"
            POST_COMMENT="❌ OpenAI Error: $ERROR"

          elif [ -z "$CONTENT" ]; then
            echo "⚠️ EMPTY AI RESPONSE"
            POST_COMMENT="⚠️ AI returned empty response. Check model, quota, or diff size."

          else
            echo "✅ AI RESPONSE OK"
            POST_COMMENT="### 🤖 AI PR REVIEW\n\n$CONTENT"
          fi

          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$POST_COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # =========================
      # 6. Fallback (no diff)
      # =========================
      - name: Fallback
        if: steps.check.outputs.ok != 'true'
        run: |
          echo "ℹ️ Skipped AI review because diff is empty"

      # =========================
      # 7. Post comment
      # =========================
      - name: Post PR Comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📝 Posting comment..."

          COMMENT="${{ steps.ai.outputs.comment }}"

          if [ -z "$COMMENT" ]; then
            COMMENT="⚠️ No AI output generated (unknown failure)"
          fi

          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "{\"body\":\"$COMMENT\"}"

          echo "✅ Done"
