name: AI PR Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout full history
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Generate diff safely
      # =========================
      - name: Generate diff
        run: |
          echo "=== FETCH BASE BRANCH ==="
          git fetch origin ${{ github.event.pull_request.base.ref }}

          echo "=== GENERATE DIFF ==="
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > diff.txt

          echo "=== DIFF SIZE ==="
          wc -c diff.txt

      # =========================
      # Call OpenAI safely (FIXED JSON)
      # =========================
      - name: AI Review
        id: ai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== CALLING OPENAI ==="

          # convert diff → safe JSON string
          DIFF_CONTENT=$(head -c 12000 diff.txt | jq -Rs .)

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
{
  "model": "gpt-4o-mini",
  "messages": [
    {
      "role": "system",
      "content": "You are a senior iOS SwiftUI engineer. Review code and give practical feedback."
    },
    {
      "role": "user",
      "content": $DIFF_CONTENT
    }
  ]
}
EOF
          )

          echo "=== RAW RESPONSE ==="
          echo "$RESPONSE" | jq .

          # check OpenAI error
          ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')

          if [ ! -z "$ERROR" ]; then
            echo "❌ OpenAI ERROR: $ERROR"
            exit 1
          fi

          COMMENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "No review generated"')

          # safe output for GitHub Actions
          {
            echo "comment<<EOF"
            echo "$COMMENT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # =========================
      # Post comment to PR
      # =========================
      - name: Post PR comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== POSTING COMMENT ==="

          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "{\"body\":\"${{ steps.ai.outputs.comment }}\"}"