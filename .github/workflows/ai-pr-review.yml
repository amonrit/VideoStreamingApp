name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Checkout full history (สำคัญ)
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # 2. Debug PR context
      # =========================
      - name: PR Context
        run: |
          echo "PR Base: ${{ github.event.pull_request.base.sha }}"
          echo "PR Head: ${{ github.event.pull_request.head.sha }}"

      # =========================
      # 3. Generate diff (BEST PRACTICE)
      # =========================
      - name: Generate diff
        run: |
          echo "=== Generating PR diff ==="

          git diff \
            ${{ github.event.pull_request.base.sha }} \
            ${{ github.event.pull_request.head.sha }} \
            > diff.txt

          echo "=== Diff size ==="
          wc -c diff.txt

          echo "=== Diff preview ==="
          head -c 2000 diff.txt

      # =========================
      # 4. Validate diff
      # =========================
      - name: Validate diff
        id: check
        run: |
          SIZE=$(wc -c < diff.txt)

          if [ "$SIZE" -eq 0 ]; then
            echo "comment=❌ No changes detected" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "ok=true" >> $GITHUB_OUTPUT

      # =========================
      # 5. Call OpenAI
      # =========================
      - name: AI Review
        if: steps.check.outputs.ok == 'true'
        id: ai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "🤖 Calling OpenAI..."

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-4o-mini",
              "messages": [
                {
                  "role": "system",
                  "content": "You are a senior iOS engineer reviewing SwiftUI + AVPlayer streaming code. Focus on bugs, performance, memory leaks, and architecture issues."
                },
                {
                  "role": "user",
                  "content": "'"$(cat diff.txt | head -c 12000)"'"
                }
              ]
            }')

          echo "=== RAW RESPONSE ==="
          echo "$RESPONSE" | jq .

          ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ ! -z "$ERROR" ]; then
            COMMENT="❌ OpenAI Error: $ERROR"

          elif [ -z "$CONTENT" ]; then
            COMMENT="⚠️ Empty AI response (check model / quota / diff size)"

          else
            COMMENT="### 🤖 AI PR REVIEW\n\n$CONTENT"
          fi

          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # =========================
      # 6. Post comment
      # =========================
      - name: Post comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT="${{ steps.ai.outputs.comment }}"

          if [ -z "$COMMENT" ]; then
            COMMENT="⚠️ No AI output generated"
          fi

          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "{\"body\":\"$COMMENT\"}"

          echo "✅ Done"
