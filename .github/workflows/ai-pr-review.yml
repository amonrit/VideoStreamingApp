name: AI PR Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > diff.txt

      - name: Call OpenAI (SAFE JSON)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== CALL OPENAI ==="

          DIFF=$(cat diff.txt | head -c 8000)

          JSON=$(jq -n --arg diff "$DIFF" '{
            model: "gpt-4.1-mini",
            input: ("Review this code diff:\n\n" + $diff)
          }')

          RESPONSE=$(curl -s https://api.openai.com/v1/responses \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$JSON")

          echo "=== RAW RESPONSE ==="
          echo "$RESPONSE"