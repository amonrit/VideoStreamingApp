name: AI PR Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # 1) Generate safe diff
      # =========================
      - name: Generate diff against base branch
        run: |
          echo "=== FETCH BASE ==="
          git fetch origin ${{ github.event.pull_request.base.ref }}

          echo "=== GENERATING DIFF ==="
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > diff.txt

          echo "=== DIFF SIZE ==="
          wc -c diff.txt

      # =========================
      # 2) Call OpenAI API
      # =========================
      - name: AI Review
        id: ai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== CALLING OPENAI ==="

          DIFF_CONTENT=$(head -c 12000 diff.txt | sed 's/"/\\"/g')

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"gpt-4o-mini\",
              \"messages\": [
                {
                  \"role\": \"system\",
                  \"content\": \"You are a senior iOS SwiftUI engineer. Review code and give clear feedback.\"
                },
                {
                  \"role\": \"user\",
                  \"content\": \"${DIFF_CONTENT}\"
                }
              ]
            }")

          echo "=== RAW RESPONSE ==="
          echo "$RESPONSE" | jq .

          # check error first
          ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')

          if [ ! -z "$ERROR" ]; then
            echo "❌ OpenAI ERROR: $ERROR"
            exit 1
          fi

          COMMENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "No content returned"')

          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # =========================
      # 3) Post PR comment
      # =========================
      - name: Post comment to PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== POSTING COMMENT ==="

          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "{\"body\":\"${{ steps.ai.outputs.comment }}\"}"