name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout repo
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Install tools
      # =========================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      # =========================
      # Get PR diff (stable method)
      # =========================
      - name: Fetch PR Diff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching PR diff..."

          curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3.diff" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} \
            > diff.txt

          echo "=== DIFF SIZE ==="
          wc -c diff.txt

          echo "=== DIFF PREVIEW ==="
          head -c 2000 diff.txt

      # =========================
      # AI REVIEW (SAFE JSON BUILD)
      # =========================
      - name: AI Review
        id: ai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Calling OpenAI..."

          PROMPT=$(cat diff.txt | head -c 12000)

          RESPONSE=$(jq -n \
            --arg prompt "$PROMPT" \
            '{
              model: "gpt-4o-mini",
              messages: [
                {
                  role: "system",
                  content: "You are a senior iOS engineer reviewing SwiftUI + AVPlayer streaming apps. Focus on bugs, performance issues, memory leaks, and architecture problems."
                },
                {
                  role: "user",
                  content: $prompt
                }
              ]
            }' | curl -s https://api.openai.com/v1/chat/completions \
              -H "Authorization: Bearer '"$OPENAI_API_KEY"'" \
              -H "Content-Type: application/json" \
              -d @-)

          echo "=== RAW RESPONSE ==="
          echo "$RESPONSE" | jq .

          ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ ! -z "$ERROR" ]; then
            COMMENT="❌ OpenAI Error: $ERROR"

          elif [ -z "$CONTENT" ]; then
            COMMENT="⚠️ Empty AI response (check quota / prompt size / model)"

          else
            COMMENT="## 🤖 AI PR REVIEW\n\n$CONTENT"
          fi

          {
            echo "comment<<EOF"
            echo "$COMMENT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # =========================
      # Post comment to PR
      # =========================
      - name: Comment PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT="${{ steps.ai.outputs.comment }}"

          echo "Posting comment..."

          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "{\"body\":\"$COMMENT\"}"

          echo "Done"
