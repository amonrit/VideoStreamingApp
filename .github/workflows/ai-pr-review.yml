name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > diff.txt

      - name: AI Review
        id: ai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "=== CALLING OPENAI ==="

          DIFF=$(head -c 12000 diff.txt | jq -Rs .)

          JSON=$(jq -n \
            --arg model "gpt-4o-mini" \
            --arg diff "$DIFF" \
            '{
              model: $model,
              messages: [
                {
                  role: "system",
                  content: "You are a senior iOS SwiftUI engineer."
                },
                {
                  role: "user",
                  content: $diff
                }
              ]
            }')

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer '"$OPENAI_API_KEY"'" \
            -H "Content-Type: application/json" \
            -d "$JSON")

          echo "=== RAW RESPONSE ==="
          echo "$RESPONSE" | jq .

          ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')

          if [ ! -z "$ERROR" ]; then
            echo "❌ OPENAI ERROR: $ERROR"
            exit 1
          fi

          COMMENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "No review"')

          {
            echo "comment<<EOF"
            echo "$COMMENT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Post comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "{\"body\":\"${{ steps.ai.outputs.comment }}\"}"