name: AI PR Review (Debug Full)

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # 1. DEBUG INFO
      # =========================
      - name: Debug context
        run: |
          echo "🔍 Event: ${{ github.event_name }}"
          echo "🔍 PR Base: ${{ github.event.pull_request.base.ref }}"
          echo "🔍 PR Head: ${{ github.event.pull_request.head.ref }}"

      # =========================
      # 2. GET DIFF (FIXED)
      # =========================
      - name: Get PR diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}

          echo "📦 Generating diff..."
          git diff origin/${{ github.event.pull_request.base.ref }}...HEAD > diff.txt

          echo "📏 Diff size:"
          wc -c diff.txt

          echo "📄 Diff preview:"
          head -c 2000 diff.txt

      # =========================
      # 3. CHECK EMPTY DIFF
      # =========================
      - name: Validate diff
        id: check
        run: |
          SIZE=$(wc -c < diff.txt)

          if [ "$SIZE" -eq 0 ]; then
            echo "❌ ERROR: diff.txt is EMPTY"
            echo "comment=❌ No code changes detected in this PR." >> $GITHUB_OUTPUT
            exit 0
          else
            echo "ok=true" >> $GITHUB_OUTPUT
          fi

      # =========================
      # 4. CALL OPENAI
      # =========================
      - name: AI Review
        if: steps.check.outputs.ok == 'true'
        id: ai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "🤖 Calling OpenAI..."

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
          -H "Authorization: Bearer $OPENAI_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{
            "model": "gpt-4o-mini",
            "messages": [
              {
                "role": "system",
                "content": "You are a senior iOS engineer. Review SwiftUI code, AVPlayer streaming, memory leaks, and performance issues. Be concise and actionable."
              },
              {
                "role": "user",
                "content": "'"$(cat diff.txt | head -c 12000)"'"
              }
            ]
          }')

          echo "📡 RAW RESPONSE:"
          echo "$RESPONSE" | jq .

          echo "$RESPONSE" > response.json

          # =========================
          # 5. ERROR HANDLING
          # =========================
          ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ ! -z "$ERROR" ]; then
            echo "❌ OpenAI ERROR detected: $ERROR"
            POST_COMMENT="❌ AI FAILED: $ERROR"

          elif [ -z "$CONTENT" ]; then
            echo "⚠️ AI returned EMPTY response"
            POST_COMMENT="⚠️ AI returned empty response. Check model or prompt size."

          else
            POST_COMMENT="### 🤖 AI PR REVIEW\n\n$CONTENT"
          fi

          echo "comment<<EOF" >> $GITHUB_OUTPUT
          echo "$POST_COMMENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # =========================
      # 6. FALLBACK IF SKIPPED
      # =========================
      - name: Fallback comment
        if: steps.check.outputs.ok != 'true'
        run: |
          echo "ℹ️ Skipped AI because diff is empty"

      # =========================
      # 7. POST COMMENT
      # =========================
      - name: Post PR comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "📝 Posting comment..."

          COMMENT="${{ steps.ai.outputs.comment }}"

          if [ -z "$COMMENT" ]; then
            COMMENT="⚠️ No AI output generated (unknown failure)"
          fi

          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "{\"body\":\"$COMMENT\"}"

          echo "✅ Done posting comment"
