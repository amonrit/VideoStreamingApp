name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # 2. Install jq (for JSON parsing)
      # =========================
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # 3. Get PR diff (BEST PRACTICE - NO GIT ISSUES)
      # =========================
      - name: Get PR Diff from GitHub API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching PR diff..."

          curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3.diff" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} \
            > diff.txt

          echo "=== DIFF SIZE ==="
          wc -c diff.txt

          echo "=== DIFF PREVIEW ==="
          head -c 2000 diff.txt

      # =========================
      # 4. AI Review
      # =========================
      - name: AI Review
        id: ai
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Calling OpenAI..."

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "gpt-4o-mini",
              "messages": [
                {
                  "role": "system",
                  "content": "You are a senior iOS engineer reviewing SwiftUI + AVPlayer streaming apps. Focus on bugs, memory leaks, architecture, and performance."
                },
                {
                  "role": "user",
                  "content": "'"$(cat diff.txt | head -c 12000)"'"
                }
              ]
            }')

          echo "=== RAW RESPONSE ==="
          echo "$RESPONSE" | jq .

          ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ ! -z "$ERROR" ]; then
            COMMENT="❌ OpenAI Error: $ERROR"

          elif [ -z "$CONTENT" ]; then
            COMMENT="⚠️ Empty AI response (check model / quota / diff size)"

          else
            COMMENT="## 🤖 AI PR REVIEW\n\n$CONTENT"
          fi

          # escape multiline for GitHub output
          {
            echo "comment<<EOF"
            echo "$COMMENT"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # =========================
      # 5. Post comment to PR
      # =========================
      - name: Comment on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT="${{ steps.ai.outputs.comment }}"

          echo "Posting comment..."

          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d "{\"body\":\"$COMMENT\"}"

          echo "Done"
